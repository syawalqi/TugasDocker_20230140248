version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "Galih041204!"
      MYSQL_DATABASE: "deploy6"
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: spring_app
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

volumes:
  db_data:
